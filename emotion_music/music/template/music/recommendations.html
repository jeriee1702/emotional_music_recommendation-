<!DOCTYPE html>
<html>
<head>
    <title>Recommendations</title>
</head>
<body>
    <h2>Songs for emotion: {{ emotion }}</h2>

    {% if songs %}
        <ul>
        {% for song in songs %}
            <li>{{ song.title }} - {{ song.artist }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No songs found for this emotion.</p>
    {% endif %}

    <a href="/">Go Back</a>
</body>
</html>
